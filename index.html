<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Игровая Платформа</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --accent-color: #0088cc;
            --text-color: #ffffff;
            --text-muted: #95a5a6;
            --border-color: #0f3460;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--container-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--text-color);
        }

        .hidden {
            display: none !important;
        }

        /* Авторизация */
        #auth-section {
            text-align: center;
            padding: 40px 20px;
        }
        
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #0077b3;
        }

        .btn-demo {
            background-color: #555;
            margin-top: 15px;
            font-size: 14px;
        }

        /* Профиль */
        .user-card {
            display: flex;
            align-items: center;
            background: var(--border-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-color);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .user-info {
            flex-grow: 1;
        }

        .user-stats {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Табы (Топ) */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 15px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: bold;
        }

        .tab.active {
            color: var(--text-color);
            border-bottom: 3px solid var(--accent-color);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .leaderboard-table th {
            color: var(--text-muted);
        }

        .rank {
            font-weight: bold;
            color: var(--accent-color);
            width: 30px;
        }

        /* Игра Морской Бой */
        .game-status {
            text-align: center;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-width: 300px;
            margin: 0 auto 20px auto;
        }

        .cell {
            aspect-ratio: 1;
            background-color: var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .cell:hover {
            background-color: #1f4068;
        }

        .cell.miss {
            background-color: #2c3e50;
            cursor: not-allowed;
        }
        .cell.miss::after {
            content: "•";
            color: var(--text-muted);
        }

        .cell.hit {
            background-color: var(--danger-color);
            cursor: not-allowed;
        }
        .cell.hit::after {
            content: "💥";
        }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h1>Добро пожаловать</h1>
        <p style="color: var(--text-muted);">Войдите через Telegram, чтобы начать игру</p>
        
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="YOUR_BOT_USERNAME" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
        
        <br>
        <button class="btn btn-demo" onclick="simulateLogin()">Войти как Демо-Пользователь</button>
    </div>

    <div id="main-section" class="container hidden">
        <div class="user-card">
            <div id="user-avatar" class="user-avatar">U</div>
            <div class="user-info">
                <div id="user-name" style="font-weight: bold;">Telegram User</div>
                <div class="user-stats">
                    Баланс: <span id="user-balance" style="color: var(--success-color);">1000</span> 🪙 | 
                    Побед: <span id="user-wins">0</span> 🏆
                </div>
            </div>
            <button class="btn" onclick="logout()" style="padding: 5px 10px; font-size: 12px; background: #333;">Выйти</button>
        </div>

        <div class="container" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
            <h3>Морской Бой 5x5</h3>
            <div id="game-status" class="game-status">Найдите 3 корабля врага!</div>
            <div id="grid" class="grid"></div>
            <div style="text-align: center;">
                <button class="btn" onclick="initGame()">Перезапустить игру</button>
            </div>
        </div>

        <div class="tabs">
            <div id="tab-balance" class="tab active" onclick="switchTab('balance')">Топ по балансу</div>
            <div id="tab-games" class="tab" onclick="switchTab('games')">Топ по играм</div>
        </div>

        <div id="leaderboard-balance">
            <table class="leaderboard-table">
                <thead>
                    <tr><th>#</th><th>Игрок</th><th>Баланс</th></tr>
                </thead>
                <tbody id="leaderboard-balance-body">
                    </tbody>
            </table>
        </div>

        <div id="leaderboard-games" class="hidden">
            <table class="leaderboard-table">
                <thead>
                    <tr><th>#</th><th>Игрок</th><th>Победы</th></tr>
                </thead>
                <tbody id="leaderboard-games-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Имитация базы данных локально в браузере (для демонстрации)
        let currentUser = null;
        
        const mockLeaderboard = [
            { id: 1, first_name: "Дуров", username: "durov", balance: 50000, wins: 42 },
            { id: 2, first_name: "Илон Маск", username: "elon", balance: 35000, wins: 38 },
            { id: 3, first_name: "Алексей", username: "alex", balance: 12500, wins: 19 },
            { id: 4, first_name: "Мария", username: "mash_a", balance: 8400, wins: 12 },
        ];

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        
        // Функция вызывается реальным виджетом Telegram при успешном входе
        function onTelegramAuth(user) {
            currentUser = {
                id: user.id,
                first_name: user.first_name,
                username: user.username || "no_username",
                balance: 1000,
                wins: 0
            };
            loginSuccess();
        }

        // Симуляция входа для локального тестирования
        function simulateLogin() {
            currentUser = {
                id: 777,
                first_name: "Иван Тестер",
                username: "ivan_test",
                balance: 1200,
                wins: 3
            };
            loginSuccess();
        }

        function loginSuccess() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            
            // Обновляем профиль
            document.getElementById('user-name').innerText = currentUser.first_name + ` (@${currentUser.username})`;
            document.getElementById('user-avatar').innerText = currentUser.first_name.charAt(0);
            updateUserUI();
            
            // Загружаем таблицы и игру
            renderLeaderboards();
            initGame();
        }

        function logout() {
            currentUser = null;
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        function updateUserUI() {
            document.getElementById('user-balance').innerText = currentUser.balance;
            document.getElementById('user-wins').innerText = currentUser.wins;
        }

        // --- ЛОГИКА ТАБЛИЦЫ ЛИДЕРОВ ---
        function switchTab(type) {
            if (type === 'balance') {
                document.getElementById('tab-balance').classList.add('active');
                document.getElementById('tab-games').classList.remove('active');
                document.getElementById('leaderboard-balance').classList.remove('hidden');
                document.getElementById('leaderboard-games').classList.add('hidden');
            } else {
                document.getElementById('tab-balance').classList.remove('active');
                document.getElementById('tab-games').classList.add('active');
                document.getElementById('leaderboard-balance').classList.add('hidden');
                document.getElementById('leaderboard-games').classList.remove('hidden');
            }
        }

        function renderLeaderboards() {
            // Добавляем текущего юзера в общий список для наглядности топа
            const allUsers = [...mockLeaderboard];
            if (!allUsers.some(u => u.id === currentUser.id)) {
                allUsers.push(currentUser);
            }

            // Сортировка по балансу
            const sortByBalance = [...allUsers].sort((a, b) => b.balance - a.balance);
            const balanceBody = document.getElementById('leaderboard-balance-body');
            balanceBody.innerHTML = sortByBalance.map((user, index) => `
                <tr style="${user.id === currentUser.id ? 'background: rgba(0,136,204,0.1);' : ''}">
                    <td class="rank">${index + 1}</td>
                    <td>${user.first_name} ${user.id === currentUser.id ? '<b>(Вы)</b>' : ''}</td>
                    <td style="color: var(--success-color);">${user.balance} 🪙</td>
                </tr>
            `).join('');

            // Сортировка по играм (победам)
            const sortByGames = [...allUsers].sort((a, b) => b.wins - a.wins);
            const gamesBody = document.getElementById('leaderboard-games-body');
            gamesBody.innerHTML = sortByGames.map((user, index) => `
                <tr style="${user.id === currentUser.id ? 'background: rgba(0,136,204,0.1);' : ''}">
                    <td class="rank">${index + 1}</td>
                    <td>${user.first_name} ${user.id === currentUser.id ? '<b>(Вы)</b>' : ''}</td>
                    <td>${user.wins} 🏆</td>
                </tr>
            `).join('');
        }


        // --- ЛОГИКА ИГРЫ МОРСКОЙ БОЙ ---
        let board = [];
        let shipsLeft = 0;
        let gameActive = true;
        let shots = 0;

        function initGame() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            board = Array(25).fill(0); // 5х5 = 25 клеток
            shipsLeft = 3;
            shots = 0;
            gameActive = true;
            document.getElementById('game-status').innerText = `Найдите 3 корабля! Выстрелов: ${shots}`;
            document.getElementById('game-status').style.color = 'white';

            // Случайная расстановка 3 однопалубных кораблей
            let placedShips = 0;
            while (placedShips < 3) {
                let randomIdx = Math.floor(Math.random() * 25);
                if (board[randomIdx] === 0) {
                    board[randomIdx] = 1; // 1 означает корабль
                    placedShips++;
                }
            }

            // Отрисовка поля
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gridElement.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            
            const cell = e.target;
            const index = parseInt(cell.dataset.index);

            // Если по клетке уже стреляли
            if (cell.classList.contains('hit') || cell.classList.contains('miss')) {
                return;
            }

            shots++;

            if (board[index] === 1) {
                // Попал!
                cell.classList.add('hit');
                shipsLeft--;
                currentUser.balance += 100; // Награда за попадание
                if (shipsLeft === 0) {
                    gameActive = false;
                    currentUser.wins += 1;
                    currentUser.balance += 500; // Бонус за победу
                    document.getElementById('game-status').innerText = `Победа за ${shots} выстрелов! Получено +500 🪙`;
                    document.getElementById('game-status').style.color = 'var(--success-color)';
                } else {
                    document.getElementById('game-status').innerText = `Попал! Осталось 3 корабля: ${shipsLeft}. Выстрелов: ${shots}`;
                }
            } else {
                // Промазал
                cell.classList.add('miss');
                document.getElementById('game-status').innerText = `Мимо. Выстрелов: ${shots}`;
            }

            updateUserUI();
            renderLeaderboards(); // Обновляем топ в реальном времени
        }
    </script>
</body>
</html>
