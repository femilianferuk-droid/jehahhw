<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Spin - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a22;
            --gold: #d4af37;
            --gold-bright: #ffdf73;
            --danger: #ff4757;
            --success: #2ed573;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); 
            color: var(--white);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка профиля */
        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            border: 2px solid var(--gold);
            background: #333;
            object-fit: cover;
        }
        .username { font-weight: 700; font-size: 14px; }

        .balance-badge {
            background: linear-gradient(45deg, var(--gold), var(--gold-bright));
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        /* Изображения */
        .banner-scroll {
            display: flex;
            gap: 15px;
            padding: 20px;
            overflow-x: auto;
            width: 100%;
            scrollbar-width: none;
        }
        .banner-scroll::-webkit-scrollbar { display: none; }
        .banner-item {
            min-width: 280px;
            height: 140px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Игра CRASH */
        .crash-box {
            width: calc(100% - 40px);
            max-width: 500px;
            background: var(--card);
            border-radius: 25px;
            padding: 25px;
            margin-top: 10px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .multiplier-display {
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: 900;
            margin-bottom: 20px;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }

        #chart-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .mult-text { position: relative; z-index: 2; text-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .controls { display: grid; gap: 15px; }
        .input-group { display: flex; background: #000; border-radius: 12px; padding: 5px; border: 1px solid #333; }
        input { 
            flex: 1; background: transparent; border: none; color: #fff; 
            text-align: center; font-size: 18px; font-weight: 700; outline: none;
        }

        .btn {
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-bet { background: var(--gold); color: #000; }
        .btn-cashout { background: var(--success); color: #000; display: none; }
        .btn:active { transform: scale(0.96); }

        .status-msg { margin-top: 10px; font-size: 12px; color: #888; min-height: 15px; }

        .crashed { color: var(--danger) !important; }
    </style>
</head>
<body>

    <header class="header">
        <div class="user-info">
            <img src="" alt="" class="avatar" id="user-avatar">
            <div class="username" id="user-name">Загрузка...</div>
        </div>
        <div class="balance-badge"><span id="balance">0.00</span> ⭐</div>
    </header>

    <div class="banner-scroll">
        <div class="banner-item" style="background-image: url('https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?q=80&w=400&auto=format&fit=crop')"></div>
        <div class="banner-item" style="background-image: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=400&auto=format&fit=crop')"></div>
    </div>

    <div class="crash-box">
        <div class="multiplier-display">
            <canvas id="chart-canvas"></canvas>
            <div class="mult-text" id="mult-value">1.00x</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="number" id="bet-amount" value="1" min="1">
            </div>
            <button class="btn btn-bet" id="btn-main" onclick="handleMainAction()">Поставить ставку</button>
            <div class="status-msg" id="status-text">Минимальная ставка: 1 ⭐</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Инициализация данных пользователя
        const user = tg.initDataUnsafe?.user;
        const avatarEl = document.getElementById('user-avatar');
        const nameEl = document.getElementById('user-name');

        if (user) {
            nameEl.innerText = user.first_name;
            avatarEl.src = user.photo_url || 'https://ui-avatars.com/api/?name=' + user.first_name;
        } else {
            nameEl.innerText = "Royal Игрок";
            avatarEl.src = 'https://ui-avatars.com/api/?name=User';
        }

        // Логика баланса (10 звезд при первом входе)
        let balance = parseFloat(localStorage.getItem('balance'));
        if (isNaN(balance)) {
            balance = 10.00;
            localStorage.setItem('balance', balance);
        }
        updateUI();

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
        }

        // --- ЛОГИКА ИГРЫ CRASH ---
        let isRunning = false;
        let isWaiting = false;
        let currentMult = 1.00;
        let betValue = 0;
        let gameInterval;
        let crashPoint = 0;

        const multDisplay = document.getElementById('mult-value');
        const mainBtn = document.getElementById('btn-main');
        const statusText = document.getElementById('status-text');

        function handleMainAction() {
            if (!isRunning && !isWaiting) {
                startBet();
            } else if (isRunning) {
                cashOut();
            }
        }

        function startBet() {
            const input = document.getElementById('bet-amount');
            const amount = parseFloat(input.value);

            if (amount > balance) {
                tg.HapticFeedback.notificationOccurred('error');
                statusText.innerText = "Недостаточно звезд!";
                return;
            }

            if (amount < 1) return;

            // Списываем баланс
            balance -= amount;
            betValue = amount;
            localStorage.setItem('balance', balance);
            updateUI();

            // Состояние ожидания
            isWaiting = true;
            mainBtn.innerText = "Взлет...";
            mainBtn.style.background = "#555";
            statusText.innerText = "Ожидание полета...";
            
            // Запуск через небольшую задержку
            setTimeout(launchGame, 1500);
        }

        function launchGame() {
            isWaiting = false;
            isRunning = true;
            currentMult = 1.00;
            
            // Генерация точки краша (в реале это делает СЕРВЕР)
            // Формула: дом имеет преимущество 3%
            const rand = Math.random();
            crashPoint = rand < 0.03 ? 1.00 : (0.97 / (1 - rand));

            mainBtn.innerText = "Забрать";
            mainBtn.style.background = "var(--success)";
            multDisplay.classList.remove('crashed');

            gameInterval = setInterval(() => {
                currentMult += 0.01 + (currentMult * 0.002); // Ускорение со временем
                multDisplay.innerText = currentMult.toFixed(2) + "x";

                if (currentMult >= crashPoint) {
                    crash();
                }
            }, 100);
        }

        function cashOut() {
            if (!isRunning) return;
            
            const win = betValue * currentMult;
            balance += win;
            localStorage.setItem('balance', balance);
            updateUI();

            tg.HapticFeedback.notificationOccurred('success');
            statusText.innerText = `Вы выиграли: ${win.toFixed(2)} ⭐`;
            
            isRunning = false; // Мы вышли, но игра продолжается визуально до краша
            mainBtn.innerText = "Вы забрали!";
            mainBtn.disabled = true;
            mainBtn.style.background = "#333";
        }

        function crash() {
            clearInterval(gameInterval);
            isRunning = false;
            isWaiting = false;
            
            multDisplay.innerText = currentMult.toFixed(2) + "x";
            multDisplay.classList.add('crashed');
            tg.HapticFeedback.notificationOccurred('warning');

            mainBtn.disabled = false;
            mainBtn.innerText = "Поставить ставку";
            mainBtn.style.background = "var(--gold)";
            
            if (statusText.innerText.indexOf('Вы выиграли') === -1) {
                statusText.innerText = "КРАШ! Ставка сгорела";
            }
        }
    </script>
</body>
</html>
